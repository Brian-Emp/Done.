<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Done. -- Register</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/done-favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/done-favicon-32.png">
    <link rel="apple-touch-icon" href="assets/done-favicon-180.png">
</head>
<body class="auth-layout">
    <form id="form_register" method="post">
        <h2>Register</h2>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <button id="btn_register">Register</button>
    </form>
    <a href="login.html">Already have an account? Login here.</a>

    <script src="js/register.js" type="module" defer></script>
</body>
</html>
